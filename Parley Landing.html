document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lor:#6b6b73; transition:color .2s, border-color .2s;\" style-hover=\"color:var(--accent);border-color:var(--accent)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M18.9 2H22l-7.1 8.1L23 22h-6.6l-5.2-6.8L5.3 22H2l7.6-8.7L1.6 2h6.7l4.7 6.2L18.9 2Zm-2.3 18h1.8L7.5 3.8H5.6L16.6 20Z\"><\u002Fpath><\u002Fsvg><\u002Fa>\n        <a href=\"#top\" aria-label=\"LinkedIn\" style=\"width:34px; height:34px; border-radius:9px; border:1px solid #EAEAED; display:inline-flex; align-items:center; justify-content:center; color:#6b6b73; transition:color .2s, border-color .2s;\" style-hover=\"color:var(--accent);border-color:var(--accent)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5ZM3 9h4v12H3V9Zm6 0h3.8v1.7h.05c.53-1 1.83-2.05 3.77-2.05 4.03 0 4.78 2.65 4.78 6.1V21h-4v-5.4c0-1.3-.02-2.95-1.8-2.95-1.8 0-2.08 1.4-2.08 2.85V21H9V9Z\"><\u002Fpath><\u002Fsvg><\u002Fa>\n        <a href=\"#top\" aria-label=\"GitHub\" style=\"width:34px; height:34px; border-radius:9px; border:1px solid #EAEAED; display:inline-flex; align-items:center; justify-content:center; color:#6b6b73; transition:color .2s, border-color .2s;\" style-hover=\"color:var(--accent);border-color:var(--accent)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.9 1.53 2.34 1.09 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02a9.56 9.56 0 0 1 5 0c1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85v2.74c0 .27.18.58.69.48A10 10 0 0 0 12 2Z\"><\u002Fpath><\u002Fsvg><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#5B50E6&quot;,&quot;options&quot;:[&quot;#5B50E6&quot;,&quot;#2563EB&quot;,&quot;#0E9E6E&quot;,&quot;#E0533D&quot;,&quot;#111114&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;cornerStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Rounded&quot;,&quot;options&quot;:[&quot;Rounded&quot;,&quot;Sharp&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;headingScale&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1,&quot;min&quot;:0.85,&quot;max&quot;:1.2,&quot;step&quot;:0.05,&quot;unit&quot;:&quot;x&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Theme&quot;}}\">\nclass Component extends DCLogic {\n  state = { annual: true, openFaq: 0, menuOpen: false };\n\n  componentDidMount(){ this.syncVars(); }\n  componentDidUpdate(){ this.syncVars(); }\n  setRoot = (el) => { this.rootEl = el; this.syncVars(); };\n\n  _hex(hex){\n    let h = (hex || '#5B50E6').replace('#','');\n    if (h.length === 3) h = h.split('').map(c => c + c).join('');\n    const n = parseInt(h, 16);\n    return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };\n  }\n  hexA(hex, a){ const c = this._hex(hex); return `rgba(${c.r},${c.g},${c.b},${a})`; }\n  shade(hex, pct){\n    const c = this._hex(hex); const f = 1 + pct/100;\n    const cl = v => Math.max(0, Math.min(255, Math.round(v*f)));\n    return '#' + [cl(c.r), cl(c.g), cl(c.b)].map(x => x.toString(16).padStart(2,'0')).join('');\n  }\n  syncVars(){\n    const el = this.rootEl; if (!el) return;\n    const a = this.props.accentColor || '#5B50E6';\n    el.style.setProperty('--accent', a);\n    el.style.setProperty('--accent-hover', this.shade(a, -14));\n    el.style.setProperty('--accent-soft', this.hexA(a, 0.10));\n    el.style.setProperty('--accent-glow', this.hexA(a, 0.28));\n    const corner = this.props.cornerStyle || 'Rounded';\n    el.style.setProperty('--radius', corner === 'Sharp' ? '4px' : '18px');\n    el.style.setProperty('--radius-sm', corner === 'Sharp' ? '3px' : '12px');\n    el.style.setProperty('--h-scale', String(this.props.headingScale ?? 1));\n  }\n\n  toggleAnnual = () => this.setState(s => ({ annual: !s.annual }));\n  toggleMenu = () => this.setState(s => ({ menuOpen: !s.menuOpen }));\n  closeMenu = () => this.setState({ menuOpen: false });\n\n  seg(active){\n    return {\n      padding: '9px 18px', borderRadius: '999px', fontSize: '14px', fontWeight: 700,\n      color: active ? '#0C0C11' : '#8a8a91',\n      background: active ? '#fff' : 'transparent',\n      boxShadow: active ? '0 1px 3px rgba(0,0,0,0.10)' : 'none',\n      transition: 'all .2s'\n    };\n  }\n\n  renderVals(){\n    const annual = this.state.annual;\n    const faqData = [\n      { q: 'How does Parley join my meetings?', a: 'Connect your calendar once, and Parley automatically joins any meeting with a video link — Zoom, Google Meet, or Microsoft Teams. There are no bots to invite and nothing to remember; it just shows up and starts working.' },\n      { q: 'Is my meeting data secure?', a: 'Yes. All recordings and transcripts are encrypted in transit and at rest. Business plans add SSO, SCIM provisioning, and custom retention policies. We are SOC 2 Type II certified and never train models on your data.' },\n      { q: 'How accurate is the transcription?', a: 'Parley delivers 99.2% transcription accuracy across 30+ languages, with automatic speaker identification. Accuracy improves over time as it learns your team’s names, acronyms, and product vocabulary.' },\n      { q: 'Can I edit the summaries and emails?', a: 'Absolutely. Every summary, action item, and follow-up email is fully editable before it goes out. You can also set rules to auto-send recaps or route action items to Slack, Notion, Linear, or your CRM.' },\n      { q: 'What happens when my trial ends?', a: 'Your 14-day Pro trial requires no credit card. When it ends, you can pick a paid plan or drop to the free Starter tier — you never lose access to past meetings, and nothing is auto-charged.' },\n      { q: 'Do all participants need an account?', a: 'No. Only the host needs a Parley account. Attendees simply receive the recap email afterward, and can request access to the full transcript if you allow it.' }\n    ];\n    const faqs = faqData.map((f, i) => ({\n      q: f.q, a: f.a,\n      open: this.state.openFaq === i,\n      iconStyle: { transform: this.state.openFaq === i ? 'rotate(45deg)' : 'rotate(0deg)', transition: 'transform .25s', fontSize: '22px', color: 'var(--accent)', lineHeight: 1, flex: 'none' },\n      toggle: () => this.setState(s => ({ openFaq: s.openFaq === i ? -1 : i }))\n    }));\n\n    return {\n      setRoot: this.setRoot,\n      menuOpen: this.state.menuOpen,\n      toggleMenu: this.toggleMenu,\n      closeMenu: this.closeMenu,\n      toggleAnnual: this.toggleAnnual,\n      annual,\n      proPrice: annual ? 18 : 22,\n      bizPrice: annual ? 32 : 39,\n      billNote: annual ? 'billed annually' : 'billed monthly',\n      monthlyStyle: this.seg(!annual),\n      annualStyle: this.seg(annual),\n      faqs\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
